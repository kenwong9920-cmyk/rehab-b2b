backend:
  name: github
  repo: kenwong9920-cmyk/rehab-b2b
  branch: master
  base_url: https://www.jdrehab.com
  auth_endpoint: api/auth

media_folder: "public/images"
public_folder: "/images"

site_url: https://www.jdrehab.com
display_url: https://www.jdrehab.com
logo_url: https://bsg-i.nbxc.com/company/0d/5ba042b08d396dd7b0bd713e390079.jpg@95Q.webp

collections:
  - name: "products"
    label: "Products"
    label_singular: "Product"
    folder: "src/content/products/en"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    fields:
      - { label: "Product Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Category", name: "category", widget: "select", options: ["walking-aids", "walkers", "bath-safety", "toilet-safety", "commode-chairs"] }
      - { label: "Main Image URL", name: "image", widget: "string" }
      - { label: "Gallery Images", name: "images", widget: "list", field: { label: "Image URL", name: "image", widget: "string" } }
      - { label: "MOQ", name: "moq", widget: "string", required: false }
      - { label: "Delivery Time", name: "deliveryTime", widget: "string", required: false }
      - { label: "Certifications", name: "certifications", widget: "list", default: ["CE", "FDA", "ISO 9001", "ISO 13485"], field: { label: "Cert", name: "cert", widget: "string" } }
      - { label: "Key Features", name: "features", widget: "list", field: { label: "Feature", name: "feature", widget: "string" } }
      - { label: "Specifications", name: "specifications", widget: "list", fields: [{ label: "Name", name: "name", widget: "string" }, { label: "Value", name: "value", widget: "string" }] }
      - { label: "Custom Options", name: "customOptions", widget: "list", field: { label: "Option", name: "option", widget: "string" } }
      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }
      - { label: "Display Order", name: "order", widget: "number", default: 99 }
      - { label: "Last Updated", name: "updated", widget: "date", default: "2026-06-05" }

  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "src/content/blog/en"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Excerpt (Meta Description)", name: "description", widget: "text" }
      - { label: "Publish Date", name: "date", widget: "date" }
      - { label: "Cover Image URL", name: "image", widget: "string" }
      - { label: "Body Content", name: "body", widget: "markdown" }
