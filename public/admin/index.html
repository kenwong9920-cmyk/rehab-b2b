<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JinDa — CMS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f1f5f9;min-height:100vh}
.login-box{max-width:360px;margin:120px auto 0;text-align:center}
.login-box h2{margin-bottom:16px;color:#1e293b;font-size:22px}
.login-box input{width:100%;padding:10px 14px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;margin:8px 0}
.login-box button{width:100%;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:#1e293b;color:#cbd5e1;padding:20px 0;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sidebar h2{color:#fff;font-size:16px;padding:0 20px 16px;border-bottom:1px solid #334155;margin-bottom:8px}
.sidebar .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#94a3b8;font-size:14px;cursor:pointer;border-left:3px solid transparent}
.sidebar .nav-item:hover,.sidebar .nav-item.active{background:#334155;color:#fff;border-left-color:#3b82f6}
.sidebar-footer{padding:20px;margin-top:auto;border-top:1px solid #334155;font-size:12px;color:#64748b}
.main{margin-left:220px;flex:1;padding:24px 32px;max-width:1200px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.header h1{font-size:22px;color:#1e293b}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#2563eb;color:#fff}.btn-success{background:#16a34a;color:#fff}.btn-danger{background:#ef4444;color:#fff}.btn-outline{background:#fff;color:#475569;border:1px solid #cbd5e1}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
th,td{padding:10px 14px;text-align:left;font-size:13px;border-bottom:1px solid #f1f5f9}
th{background:#f8fafc;color:#64748b;font-weight:600;text-transform:uppercase;font-size:11px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal{background:#fff;border-radius:12px;width:700px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:20px;max-height:70vh;overflow-y:auto}
.modal-footer{padding:12px 20px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:8px}
.fg{margin-bottom:14px}.fg label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:4px;text-transform:uppercase}
.fg input,.fg textarea,.fg select{width:100%;padding:8px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;font-family:inherit}
.fg textarea{resize:vertical;min-height:80px;font-family:monospace;font-size:12px;line-height:1.6}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;color:#fff;font-size:13px;z-index:9999;display:none;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.ok{background:#16a34a}.toast.err{background:#ef4444}
</style></head><body>

<div id="loginScreen" class="login-box">
  <h2>JinDa Rehab CMS</h2>
  <input type="password" id="passInput" placeholder="Admin password">
  <button onclick="doLogin()">Login</button>
  <p id="loginErr" style="color:#ef4444;font-size:13px;margin-top:8px;display:none">Invalid password</p>
</div>

<div id="appScreen" class="app" style="display:none">
  <nav class="sidebar" id="sidebarNav"></nav>
  <main class="main" id="mainArea"><div style="padding:40px;text-align:center;color:#94a3b8">Loading...</div></main>
</div>
<div class="toast" id="toast"></div>
<div id="modalBox"></div>

<script>
var API='/api/admin',TAB='products';

// LOGIN
function doLogin(){
  var v=document.getElementById('passInput').value;
  if(v==='jinda2026'){sessionStorage.setItem('jin_auth','1');showApp();}
  else document.getElementById('loginErr').style.display='';
}
document.getElementById('passInput').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
if(sessionStorage.getItem('jin_auth')==='1')showApp();

function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='flex';
  renderSidebar();goProducts();
}

// TOAST
function toast(m,t){var el=document.getElementById('toast');el.textContent=m;el.className='toast '+t;el.style.display='block';setTimeout(function(){el.style.display='none';},2500);}

// API
function api(a,p,x){x=x||{};return fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:a,path:p,content:x.content,sha:x.sha,message:x.message})}).then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(d.error||'API error');return d;});});}

// SIDEBAR
function renderSidebar(){
  var items=[{id:'products',label:'Products'},{id:'blog',label:'Blog Posts'},{id:'settings',label:'Company Settings'}];
  var h='<h2>JinDa CMS</h2>';
  for(var i=0;i<items.length;i++){h+='<div class="nav-item'+(TAB===items[i].id?' active':'')+'" onclick="goTab(\''+items[i].id+'\')">'+items[i].label+'</div>';}
  h+='<div class="sidebar-footer"><a href="/en/" target="_blank">View Site</a></div>';
  document.getElementById('sidebarNav').innerHTML=h;
}
function goTab(t){TAB=t;renderSidebar();if(t==='products')goProducts();else if(t==='blog')goBlog();else goSettings();}

// ====== PRODUCTS ======
function goProducts(){
  document.getElementById('mainArea').innerHTML='<div style="padding:40px;text-align:center;color:#94a3b8">Loading products...</div>';
  api('list','src/content/products/en').then(function(files){
    var list=Array.isArray(files)?files.filter(function(f){return f.name&&f.name.endsWith('.md');}):[];
    var h='<div class="header"><h1>Products ('+list.length+')</h1><button class="btn btn-success" onclick="newProduct()">+ New Product</button></div>';
    if(list.length===0){h+='<div style="text-align:center;padding:60px;color:#94a3b8"><p>No products yet</p></div>';}
    else {
      h+='<table><thead><tr><th>Title</th><th>Category</th><th>MOQ</th><th style="width:120px">Actions</th></tr></thead><tbody>';
      for(var i=0;i<list.length;i++){(function(f){
        h+='<tr id="row-'+f.name+'"><td>Loading...</td><td>-</td><td>-</td><td style="width:120px"><button class="btn btn-outline" style="padding:4px 8px;font-size:11px" onclick="editProduct(\''+f.name+'\',\''+f.sha+'\')">Edit</button> <button class="btn btn-danger" style="padding:4px 8px;font-size:11px" onclick="delItem(\''+f.name+'\',\''+f.sha+'\')">Del</button></td></tr>';
      })(list[i]);}
      h+='</tbody></table>';
    }
    document.getElementById('mainArea').innerHTML=h;
    // Load metadata
    for(var j=0;j<list.length;j++){(function(f){api('read','src/content/products/en/'+f.name).then(function(d){
      if(!d._text)return;var fm=d._text.match(/^---\n([\s\S]*?)\n---/);if(!fm)return;
      var lines=fm[1].split('\n');var meta={};
      for(var k=0;k<lines.length;k++){var m=lines[k].match(/^(\w+):\s*["']?(.*)["']?\s*$/);if(m)meta[m[1]]=m[2];}
      var row=document.getElementById('row-'+f.name);
      if(row)row.innerHTML='<td><strong>'+escHtml(meta.title||f.name)+'</strong></td><td><span style="background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:12px;font-size:11px">'+(meta.category||'-')+'</span></td><td>'+(meta.moq||'-')+'</td><td style="width:120px"><button class="btn btn-outline" style="padding:4px 8px;font-size:11px" onclick="editProduct(\''+f.name+'\',\''+f.sha+'\')">Edit</button> <button class="btn btn-danger" style="padding:4px 8px;font-size:11px" onclick="delItem(\''+f.name+'\',\''+f.sha+'\')">Del</button></td>';
    }).catch(function(){});})(list[j]);}
  }).catch(function(e){document.getElementById('mainArea').innerHTML='<div style="padding:40px;text-align:center;color:#ef4444">Error: '+e.message+'</div>';});
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function editProduct(name,sha){
  api('read','src/content/products/en/'+name).then(function(d){
    var txt=d._text||'';var fm=txt.match(/^---\n([\s\S]*?)\n---/);var raw=fm?fm[1]:'';
    var meta={};raw.split('\n').forEach(function(l){var m=l.match(/^(\w+):\s*["']?(.*)["']?\s*$/);if(m)meta[m[1]]=m[2];});
    var feats=(raw.match(/features:\n([\s\S]*?)(?=\n\w+:|$)/)||['',''])[1].match(/^\s*- ["']?(.+)/mg)||[];
    var specsRaw=(raw.match(/specifications:\n([\s\S]*?)(?=\n\w+:|$)/)||['',''])[1];
    var specs=[];var re=/^\s*- name:\s*["']?(.*)["']?\s*\n\s+value:\s*["']?(.*)["']?/g;var sm;
    while(sm=re.exec(specsRaw))specs.push({name:sm[1],value:sm[2]});
    var imgs=(raw.match(/images:\n([\s\S]*?)(?=\n\w+:|$)/)||['',''])[1].match(/^\s*- ["']?(.+)/mg)||[];
    var custs=(raw.match(/customOptions:\n([\s\S]*?)(?=\n\w+:|$)/)||['',''])[1].match(/^\s*- ["']?(.+)/mg)||[];
    var h='<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><h3>'+name+'</h3><button class="btn btn-outline" style="padding:4px 10px" onclick="closeModal()">X</button></div><div class="modal-body">';
    h+='<div class="fg-row"><div class="fg"><label>Title</label><input id="ef-title" value="'+escAttr(meta.title||'')+'"></div><div class="fg"><label>Category</label><select id="ef-cat"><option value="walking-aids"'+(meta.category==='walking-aids'?' selected':'')+'>walking-aids</option><option value="walkers"'+(meta.category==='walkers'?' selected':'')+'>walkers</option><option value="bath-safety"'+(meta.category==='bath-safety'?' selected':'')+'>bath-safety</option><option value="toilet-safety"'+(meta.category==='toilet-safety'?' selected':'')+'>toilet-safety</option><option value="commode-chairs"'+(meta.category==='commode-chairs'?' selected':'')+'>commode-chairs</option></select></div></div>';
    h+='<div class="fg"><label>Description</label><textarea id="ef-desc" rows="2">'+escAttr(meta.description||'')+'</textarea></div>';
    h+='<div class="fg-row"><div class="fg"><label>Main Image URL</label><input id="ef-img" value="'+escAttr(meta.image||'')+'"></div><div class="fg"><label>MOQ</label><input id="ef-moq" value="'+escAttr(meta.moq||'')+'"></div></div>';
    h+='<div class="fg-row"><div class="fg"><label>Delivery Time</label><input id="ef-dt" value="'+escAttr(meta.deliveryTime||'')+'"></div><div class="fg"><label>Display Order</label><input id="ef-order" type="number" value="'+(meta.order||'99')+'"></div></div>';
    h+='<div class="fg-row"><div class="fg"><label>Featured?</label><select id="ef-feat"><option value="true"'+(meta.featured==='true'?' selected':'')+'>Yes (star)</option><option value="false"'+(meta.featured!=='true'?' selected':'')+'>No</option></select></div><div class="fg"><label>Updated Date</label><input id="ef-upd" value="'+(meta.updated||'2026-06-05')+'"></div></div>';
    h+='<div class="fg"><label>Gallery Images (one URL per line)</label><textarea id="ef-imgs" rows="3">'+escAttr(imgs.map(function(i){return i.replace(/^\s*-\s*["']?/,'').replace(/["']$/,'');}).join('\n'))+'</textarea></div>';
    h+='<div class="fg"><label>Features (one per line)</label><textarea id="ef-feats" rows="3">'+escAttr(feats.map(function(i){return i.replace(/^\s*-\s*["']?/,'').replace(/["']$/,'');}).join('\n'))+'</textarea></div>';
    h+='<div class="fg"><label>Specifications (format: Name=Value, one per line)</label><textarea id="ef-specs" rows="4">'+escAttr(specs.map(function(s){return s.name+'='+s.value;}).join('\n'))+'</textarea></div>';
    h+='<div class="fg"><label>Custom Options (one per line)</label><textarea id="ef-custs" rows="3">'+escAttr(custs.map(function(i){return i.replace(/^\s*-\s*["']?/,'').replace(/["']$/,'');}).join('\n'))+'</textarea></div>';
    h+='</div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveProduct(\''+name+'\',\''+sha+'\')">Save & Deploy</button></div></div></div>';
    document.getElementById('modalBox').innerHTML=h;
  });
}

function saveProduct(name,sha){
  function g(id){return document.getElementById(id).value;}
  var feats=g('ef-feats').split('\n').filter(Boolean).map(function(l){return'  - "'+l.trim()+'"';}).join('\n');
  var imgs=g('ef-imgs').split('\n').filter(Boolean).map(function(l){return'  - "'+l.trim()+'"';}).join('\n');
  var custs=g('ef-custs').split('\n').filter(Boolean).map(function(l){return'  - "'+l.trim()+'"';}).join('\n');
  var specs=g('ef-specs').split('\n').filter(Boolean).map(function(l){var p=l.split('=');return'  - name: "'+(p[0]||'').trim()+'"\n    value: "'+(p[1]||'').trim()+'"';}).join('\n');
  var yml='---\ntitle: "'+g('ef-title')+'"\ndescription: "'+g('ef-desc')+'"\ncategory: "'+g('ef-cat')+'"\nimage: "'+g('ef-img')+'"\nimages:\n'+imgs+'\nmoq: "'+g('ef-moq')+'"\ndeliveryTime: "'+g('ef-dt')+'"\ncertifications:\n  - "CE"\n  - "FDA"\n  - "ISO 9001"\n  - "ISO 13485"\nfeatures:\n'+feats+'\nspecifications:\n'+specs+'\ncustomOptions:\n'+custs+'\nfeatured: '+g('ef-feat')+'\norder: '+g('ef-order')+'\nupdated: '+g('ef-upd')+'\n---';
  api('write','src/content/products/en/'+name,{content:yml,sha:sha,message:'cms: update '+name}).then(function(){toast('Saved! Deploying...','ok');closeModal();goProducts();}).catch(function(e){toast('Error: '+e.message,'err');});
}

function newProduct(){var slug=prompt('Product slug (e.g. carbon-fiber-cane):');if(!slug)return;
  var yml='---\ntitle: "New Product"\ndescription: ""\ncategory: "walking-aids"\nimage: ""\nimages:\n  - ""\nmoq: ""\ndeliveryTime: "15-30 days"\ncertifications:\n  - "CE"\n  - "FDA"\n  - "ISO 9001"\n  - "ISO 13485"\nfeatures:\n  - ""\nspecifications:\n  - name: ""\n    value: ""\ncustomOptions:\n  - ""\nfeatured: false\norder: 99\nupdated: "2026-06-05"\n---';
  api('write','src/content/products/en/'+slug+'.md',{content:yml,message:'cms: create '+slug}).then(function(){toast('Created!','ok');goProducts();}).catch(function(e){toast('Error: '+e.message,'err');});}

// ====== BLOG ======
function goBlog(){
  document.getElementById('mainArea').innerHTML='<div style="padding:40px;text-align:center;color:#94a3b8">Loading posts...</div>';
  api('list','src/content/blog/en').then(function(files){
    var list=Array.isArray(files)?files.filter(function(f){return f.name&&f.name.endsWith('.md');}):[];
    var h='<div class="header"><h1>Blog Posts ('+list.length+')</h1><button class="btn btn-success" onclick="newBlog()">+ New Post</button></div>';
    if(list.length===0){h+='<div style="text-align:center;padding:60px;color:#94a3b8"><p>No posts yet</p></div>';}
    else {
      h+='<table><thead><tr><th>Title</th><th>Date</th><th style="width:120px">Actions</th></tr></thead><tbody>';
      for(var i=0;i<list.length;i++){(function(f){h+='<tr id="brow-'+f.name+'"><td>Loading...</td><td>-</td><td style="width:120px"><button class="btn btn-outline" style="padding:4px 8px;font-size:11px" onclick="editBlog(\''+f.name+'\',\''+f.sha+'\')">Edit</button> <button class="btn btn-danger" style="padding:4px 8px;font-size:11px" onclick="delBlog(\''+f.name+'\',\''+f.sha+'\')">Del</button></td></tr>';})(list[i]);}
      h+='</tbody></table>';
    }
    document.getElementById('mainArea').innerHTML=h;
    for(var j=0;j<list.length;j++){(function(f){api('read','src/content/blog/en/'+f.name).then(function(d){
      if(!d._text)return;var fm=d._text.match(/^---\n([\s\S]*?)\n---/);if(!fm)return;
      var lines=fm[1].split('\n');var meta={};
      for(var k=0;k<lines.length;k++){var m=lines[k].match(/^(\w+):\s*["']?(.*)["']?\s*$/);if(m)meta[m[1]]=m[2];}
      var row=document.getElementById('brow-'+f.name);
      if(row)row.innerHTML='<td><strong>'+escHtml(meta.title||f.name)+'</strong></td><td>'+(meta.date||'-')+'</td><td style="width:120px"><button class="btn btn-outline" style="padding:4px 8px;font-size:11px" onclick="editBlog(\''+f.name+'\',\''+f.sha+'\')">Edit</button> <button class="btn btn-danger" style="padding:4px 8px;font-size:11px" onclick="delBlog(\''+f.name+'\',\''+f.sha+'\')">Del</button></td>';
    }).catch(function(){});})(list[j]);}
  }).catch(function(e){document.getElementById('mainArea').innerHTML='<div style="padding:40px;text-align:center;color:#ef4444">Error: '+e.message+'</div>';});
}

function editBlog(name,sha){
  api('read','src/content/blog/en/'+name).then(function(d){
    var txt=d._text||'';var fm=txt.match(/^---\n([\s\S]*?)\n---/);
    var lines=(fm?fm[1]:'').split('\n');var meta={};var body=fm?txt.slice(fm[0].length).trim():txt;
    for(var k=0;k<lines.length;k++){var m=lines[k].match(/^(\w+):\s*["']?(.*)["']?\s*$/);if(m)meta[m[1]]=m[2];}
    var h='<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><h3>'+name+'</h3><button class="btn btn-outline" style="padding:4px 10px" onclick="closeModal()">X</button></div><div class="modal-body">';
    h+='<div class="fg-row"><div class="fg"><label>Title</label><input id="bf-title" value="'+escAttr(meta.title||'')+'"></div><div class="fg"><label>Date</label><input id="bf-date" value="'+(meta.date||'2026-06-05')+'"></div></div>';
    h+='<div class="fg"><label>Excerpt</label><textarea id="bf-desc" rows="2">'+escAttr(meta.description||'')+'</textarea></div>';
    h+='<div class="fg"><label>Cover Image URL</label><input id="bf-img" value="'+escAttr(meta.image||'')+'"></div>';
    h+='<div class="fg"><label>Body (Markdown)</label><textarea id="bf-body" rows="14">'+escAttr(body)+'</textarea></div>';
    h+='</div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveBlog(\''+name+'\',\''+sha+'\')">Save & Deploy</button></div></div></div>';
    document.getElementById('modalBox').innerHTML=h;
  });
}
function saveBlog(name,sha){
  function g(id){return document.getElementById(id).value;}
  var yml='---\ntitle: "'+g('bf-title')+'"\ndescription: "'+g('bf-desc')+'"\ndate: '+g('bf-date')+'\nimage: "'+g('bf-img')+'"\n---\n\n'+g('bf-body');
  api('write','src/content/blog/en/'+name,{content:yml,sha:sha,message:'cms: update '+name}).then(function(){toast('Saved!','ok');closeModal();goBlog();}).catch(function(e){toast('Error: '+e.message,'err');});
}
function newBlog(){var slug=prompt('Post slug (e.g. industry-trends-2026):');if(!slug)return;
  api('write','src/content/blog/en/'+slug+'.md',{content:'---\ntitle: "New Post"\ndescription: ""\ndate: "2026-06-05"\nimage: ""\n---\n\nWrite your content here.',message:'cms: create '+slug}).then(function(){toast('Created!','ok');goBlog();}).catch(function(e){toast('Error: '+e.message,'err');});}
function delBlog(name,sha){delItem('blog','src/content/blog/en',name,sha);}

// ====== SETTINGS ======
function goSettings(){
  document.getElementById('mainArea').innerHTML='<div style="padding:40px;text-align:center;color:#94a3b8">Loading settings...</div>';
  api('read','src/utils/constants.ts').then(function(d){
    var txt=d._text||'';
    document.getElementById('mainArea').innerHTML='<div class="header"><h1>Company Settings</h1><button class="btn btn-primary" onclick="saveSettings(\''+d.sha+'\')">Save Changes</button></div><div class="fg"><label>src/utils/constants.ts</label><textarea id="sc" rows="22" style="font-family:monospace;font-size:12px;line-height:1.6">'+escAttr(txt)+'</textarea></div>';
  }).catch(function(e){document.getElementById('mainArea').innerHTML='<div style="padding:40px;color:#ef4444">Error: '+e.message+'</div>';});
}
function saveSettings(sha){api('write','src/utils/constants.ts',{content:document.getElementById('sc').value,sha:sha,message:'cms: update settings'}).then(function(){toast('Saved!','ok');goSettings();}).catch(function(e){toast('Error: '+e.message,'err');});}

// ====== COMMON ======
function delItem(type,dir,name,sha){if(!confirm('Delete '+name+'?'))return;
  api('delete',dir+'/'+name,{sha:sha,message:'cms: delete '+name}).then(function(){toast('Deleted','ok');goTab(type);}).catch(function(e){toast('Error: '+e.message,'err');});}
function closeModal(){document.getElementById('modalBox').innerHTML='';}
</script>
</body></html>
